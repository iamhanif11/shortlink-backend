basePath: /
definitions:
  dto.ErrorResponse:
    properties:
      error:
        type: string
      isSucces:
        type: boolean
      message:
        type: string
    type: object
  dto.LoginReq:
    properties:
      email:
        example: koda36@gmail.com
        type: string
      password:
        example: Password123
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.LoginUserDetail'
    type: object
  dto.LoginUserDetail:
    properties:
      email:
        type: string
      id:
        type: integer
    type: object
  dto.RegisterReq:
    properties:
      confirm_password:
        type: string
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    type: object
  dto.RegisterRes:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
    type: object
  dto.Response-dto_LoginResponse:
    properties:
      data:
        $ref: '#/definitions/dto.LoginResponse'
      isSucces:
        type: boolean
      message:
        type: string
    type: object
  dto.Response-dto_RegisterRes:
    properties:
      data:
        $ref: '#/definitions/dto.RegisterRes'
      isSucces:
        type: boolean
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend shortlink created by Hanif using Gin
  license:
    name: MIT
  title: Backend Shortlink
  version: "1.0"
paths:
  /api/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password to get a JWT token
      parameters:
      - description: Login Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/dto.Response-dto_LoginResponse'
        "400":
          description: Invalid input validation
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - Invalid email or password
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: User Login
      tags:
      - Authentication
  /api/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Registration Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterReq'
      produces:
      - application/json
      responses:
        "201":
          description: Registration successful
          schema:
            $ref: '#/definitions/dto.Response-dto_RegisterRes'
        "400":
          description: Invalid input validation/ password mismatch
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Email already registered
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - Authentication
securityDefinitions:
  ApiKeyAuth:
    description: 'Bearer token used for authorization (Format: Bearer <token>)'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
