services:
  shortlink-db:
    image: postgres:17.10-alpine
    env_file:
      - ./psql/.env
    volumes:
      - psql:/var/lib/postgresql/data
    ports:
      - "5050:5432"
    networks:
      - shortlink-network
    restart: always
  shortlink-redis:
    build: ./rdb
    ports:
      - "6379:6379"
    volumes:
      - rdb:/data
    networks:
      - shortlink-network

networks:
  shortlink-network:

volumes:
  psql:
  rdb:

